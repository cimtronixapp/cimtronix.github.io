<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <title>Star Logic - Support & Privacy</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 40px 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 10px; color: #000; }
        p { color: #666; margin-bottom: 30px; }
        .button { display: block; padding: 15px; margin: 10px 0; text-decoration: none; border-radius: 8px; font-weight: bold; transition: transform 0.2s; }

        .ios { background-color: #007AFF; color: white; } /* Bleu Apple */
        .android { background-color: #3DDC84; color: black; } /* Vert Android */
        .footer { margin-top: 20px; font-size: 0.8em; color: #999; }

</head>
<body>
    <div class="container">
        <h1>Star Logic</h1>
        <p>Support & Privacy Policy</p>
        
        <a href="https://sites.google.com/view/starlogic-privacynoticeios/accueil" class="button ios">Privacy Policy (iOS)</a>
        
        <a href="https://sites.google.com/view/starlogic-privacypolicy/accueil" class="button android">Privacy Policy (Android)</a>
        
        <div class="footer">
            Contact support via the links above.
        </div>
